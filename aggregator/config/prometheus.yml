# prometheus.yml — AGGREGATOR CONFIG
# Hybrid mode: remote_write (push) from Alloy nodes + direct scrape (pull) from non-Alloy nodes.
# Pull targets are NOT hardcoded here — they live in targets/ on disk, generated by Ansible.
# This file is identical across all aggregators. Host-specific targets are injected at deploy time.
# Retention and storage size controlled via .env.

global:
  scrape_interval:     60s
  evaluation_interval: 60s
  external_labels:
    role: aggregator

scrape_configs:
  # Self-scrape — Prometheus own health metrics
  - job_name: prometheus-self
    static_configs:
      - targets: ['localhost:9090']

  # Pull targets — non-Alloy nodes (armv7, IoT, etc.)
  # Target files are generated by Ansible at deploy time into targets/ on disk.
  # If a file doesn't exist or is empty, the job scrapes nothing — safe on all aggregators.
  - job_name: node-exporter-pull
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/node-exporter.yml
        refresh_interval: 30s

  - job_name: docker-inventory-pull
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/docker-inventory.yml
        refresh_interval: 30s
