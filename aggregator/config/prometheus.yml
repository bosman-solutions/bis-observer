# prometheus.yml — AGGREGATOR CONFIG
# Hybrid mode: remote_write (push) from Alloy nodes + direct scrape (pull) from non-Alloy nodes.
# Pull targets are NOT hardcoded here — they live in targets/ on disk, generated by Ansible.
# This file is identical across all aggregators. Host-specific targets are injected at deploy time.
# Retention and storage size controlled via .env.

global:
  scrape_interval:     60s
  evaluation_interval: 60s
  external_labels:
    role: aggregator

scrape_configs:
  # Self-scrape — Prometheus own health metrics
  - job_name: prometheus-self
    static_configs:
      - targets: ['localhost:9090']

  # Pull targets — non-Alloy nodes (armv7, IoT, etc.)
  # Target files are generated by Ansible at deploy time into targets/ on disk.
  # If a file doesn't exist or is empty, the job scrapes nothing — safe on all aggregators.
  - job_name: node-exporter-pull
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/node-exporter.yml
        refresh_interval: 30s

  - job_name: docker-inventory-pull
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/docker-inventory.yml
        refresh_interval: 30s

  # Kubernetes cluster state (kube-state-metrics) — a cluster is ingested as a
  # pull target, not pushed by a collector. Target file is provisioned by
  # Ansible on the aggregator that owns the cluster; absent/empty elsewhere, so
  # the job scrapes nothing. See targets/kube-state-metrics.yml.example.
  - job_name: kube-state-metrics-pull
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/kube-state-metrics.yml
        refresh_interval: 30s

# Credentialed scrape jobs live in their OWN files, not inline above. This
# matters: jobs like kube-cadvisor-pull reference a ServiceAccount token + CA
# (bearer token / tls_config ca_file) that exist only on the aggregator owning
# the cluster. A missing ca_file fails Prometheus config load — so if such a job
# were in this shared, fleet-identical file, every cluster-less aggregator would
# refuse to start. Keeping credentialed jobs in scrape_configs.d/ (Ansible drops
# them only where the cluster is owned) means a missing secret can never break a
# LAN aggregator. A glob matching zero files is a no-op.
# See scrape_configs.d/kube-cadvisor.yml.example.
scrape_config_files:
  - /etc/prometheus/scrape_configs.d/*.yml
