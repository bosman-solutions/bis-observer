# datasources.yml — Grafana provisioning
# Auto-configures Prometheus and Loki on first start.
# Uses internal Docker network service names — not host-exposed ports.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
