---
kind: pipeline
type: docker
name: deploy

trigger:
  event:
    - push

# Deploys bis-observer to all fleet nodes on push to ANY branch — the pushed
# branch is checked out on each node. GitHub Actions (.github/workflows/
# deploy.yml) additionally deploys main via ansible.
#
# Required secrets (set in Drone org settings):
#   drone_deploy  — SSH private key, authorized on all target nodes
#   deploy_user   — SSH username on target nodes (e.g. disco)
#   deploy_path   — path where bis-observer is cloned on each node (e.g. /opt/bis-observer)
#
# To add or remove nodes: copy a step below and adjust host and script make target.
#   Collector nodes:   make collector
#   Aggregator nodes:  make aggregator
#
# See README.md for fleet setup and node migration instructions.

steps:

  - name: deploy-balthazar
    image: appleboy/drone-ssh
    settings:
      host: balthazar
      user:
        from_secret: deploy_user
      key:
        from_secret: drone_deploy
      port: 22
      envs:
        - drone_branch
      script:
        - cd /opt/bis-observer && git fetch origin && git checkout $DRONE_BRANCH && git pull origin $DRONE_BRANCH && make collector

  - name: deploy-melchior
    image: appleboy/drone-ssh
    settings:
      host: melchior
      user:
        from_secret: deploy_user
      key:
        from_secret: drone_deploy
      port: 22
      envs:
        - drone_branch
      script:
        - cd /opt/bis-observer && git fetch origin && git checkout $DRONE_BRANCH && git pull origin $DRONE_BRANCH && make aggregator

  # Gaspar is a laptop — online intermittently. failure: ignore means the pipeline
  # succeeds regardless; deploy runs when he's up, silently skips when he's not.
  - name: deploy-gaspar
    failure: ignore
    image: appleboy/drone-ssh
    settings:
      host: gaspar
      user:
        from_secret: deploy_user
      key:
        from_secret: drone_deploy
      port: 22
      connect_timeout: 15s
      envs:
        - drone_branch
      script:
        - cd /opt/bis-observer && git fetch origin && git checkout $DRONE_BRANCH && git pull origin $DRONE_BRANCH && make collector
